[pytest]
# Put the project root on sys.path so tests can `import app` regardless of how
# pytest is invoked (`pytest` vs `python -m pytest`) or from which directory.
pythonpath = .
markers =
    smoke: fast in-process checks that the app boots and core pages respond
    health: live HTTP checks against a running server (TARGET_URL)
    api: register/login/api-key/protected-endpoint behavior
    integration: database read/write and payment helpers
testpaths = tests
