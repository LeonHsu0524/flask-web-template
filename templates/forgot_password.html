<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8f9fa;font-family:"Microsoft JhengHei",sans-serif;} .box{max-width:420px;margin:80px auto;}</style>
</head>
<body>
    <div class="box">
        <div class="card shadow-sm p-4">
            <h4 class="mb-3">忘記密碼</h4>
            {% if message %}<div class="alert alert-info">{{ message }}</div>{% endif %}
            <form method="POST" action="{{ url_for('main.forgot_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">帳號</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">寄送重設連結</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('main.web_login_page') }}">返回登入</a>
            </div>
        </div>
    </div>
</body>
</html>
