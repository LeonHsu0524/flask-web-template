<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8f9fa;font-family:"Microsoft JhengHei",sans-serif;} .box{max-width:420px;margin:80px auto;}</style>
</head>
<body>
    <div class="box">
        <div class="card shadow-sm p-4">
            <h4 class="mb-3">重設密碼</h4>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            {% if token %}
            <form method="POST" action="{{ url_for('main.reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">新密碼</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">確認新密碼</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">確認重設</button>
            </form>
            {% else %}
            <a href="{{ url_for('main.forgot_password') }}" class="btn btn-outline-primary w-100">重新申請重設連結</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
