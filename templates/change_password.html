<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8f9fa;font-family:"Microsoft JhengHei",sans-serif;} .box{max-width:420px;margin:60px auto;}</style>
</head>
<body>
    <div class="box">
        <div class="card shadow-sm p-4">
            <h4 class="mb-3">修改密碼</h4>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
            <form method="POST" action="{{ url_for('main.change_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">目前密碼</label>
                    <input type="password" name="current_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">新密碼</label>
                    <input type="password" name="new_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">確認新密碼</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">更新密碼</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('main.personal_page') }}">返回個人中心</a>
            </div>
        </div>
    </div>
</body>
</html>
