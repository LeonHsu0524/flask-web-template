events {}

http {
    # Upstream = the waitress app (change host:port if not co-located).
    upstream app_server {
        server 127.0.0.1:5000;   # docker: use "flask-app:5000"
    }

    # Shared proxy headers (X-Forwarded-Proto is REQUIRED so the app, via ProxyFix,
    # knows the original request was HTTPS -> Secure cookies + correct https URLs).
    # (Defined as a snippet via map-less include-style: repeated per server below.)

    # ---- HTTP: redirect everything to HTTPS -------------------------------
    server {
        listen 80;
        server_name _;
        # Allow ACME/letsencrypt challenges if you use certbot:
        # location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS: terminate TLS, proxy to the app --------------------------
    server {
        listen 443 ssl;
        server_name your-domain.example;     # <-- change to your domain

        # Point these at your real certificate files:
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;   # <-- enables HTTPS detection
        }
    }

    # ---- Local / no-TLS fallback -----------------------------------------
    # If you are NOT using HTTPS yet (e.g. testing), comment out the two server
    # blocks above and use this one instead (and set SESSION_COOKIE_SECURE=false):
    #
    # server {
    #     listen 80;
    #     server_name localhost;
    #     location / {
    #         proxy_pass http://app_server;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
