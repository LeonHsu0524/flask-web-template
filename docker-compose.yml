version: '3.8'

services:
  flask-app:
    build: .
    container_name: health-tracker-app
    restart: always
    volumes:
      # Map the instance folder so databases persist!
      - ./instance:/app/instance
      # Map backups, data, and logs
      - ./backups:/app/backups

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app