# OPTIONAL deployment via Docker. The default/documented deploy is running
# waitress directly behind your own nginx (see README "Deploying"). This compose
# just containerizes the waitress app; put nginx (nginx.conf) in front of it.
services:
  app:
    build: .
    restart: always
    # Load secrets/config from .env (SECRET_KEY, DB, ECPay, admin, etc.)
    env_file:
      - .env
    environment:
      APP_ENV: production
      TRUST_PROXY: "1"          # behind nginx
    # Bind to localhost only so just the local nginx can reach it.
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./instance:/app/instance   # persist databases
      - ./backups:/app/backups     # persist backups
